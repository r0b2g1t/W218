esphome:
  name: piscina-display
  friendly_name: "Terminal de Monitoramento"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

wifi:
  networks:
    - ssid: "ELIGHT"
      password: "universo"
      bssid: D8:77:8B:98:10:0B
  fast_connect: true

# Requisito obrigatório para habilitar o processamento de JSON no C++
json:

http_request:
  useragent: esphome/device
  timeout: 5s

i2c:
  sda: 8
  scl: 9

font:
  - file: "gfonts://Roboto"
    id: font_header
    size: 14
  - file: "gfonts://Orbitron"
    id: font_valor
    size: 42
  - file: "gfonts://Roboto"
    id: font_mini
    size: 10 # <-- Adicione esta linha de volta

globals:
  - id: exibir_ph
    type: bool
    initial_value: 'true'
  - id: heartbeat_active
    type: bool
    initial_value: 'false'

sensor:
  - platform: template
    name: "pH Local"
    id: ph_piscina
    accuracy_decimals: 2
    unit_of_measurement: "pH"

  - platform: template
    name: "ORP Local"
    id: orp_piscina
    accuracy_decimals: 0
    unit_of_measurement: "mV"

# Script com capture_response e a função oficial de parse do ESPHome
script:
  - id: buscar_dados_piscina
    then:
      - http_request.get:
          url: "http://192.168.6.128/sensor/ph_da_piscina"
          capture_response: true # Essencial para criar a variável 'body'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      if (root.containsKey("value")) {
                        id(ph_piscina).publish_state(root["value"]);
                        id(heartbeat_active) = true;
                      }
                      return true;
                    });
                  }
      
      - http_request.get:
          url: "http://192.168.6.128/sensor/orp_da_piscina"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      if (root.containsKey("value")) {
                        id(orp_piscina).publish_state(root["value"]);
                      }
                      return true;
                    });
                  }
      
      - delay: 400ms
      - lambda: 'id(heartbeat_active) = false;'

interval:
  - interval: 10s
    then:
      - script.execute: buscar_dados_piscina
  - interval: 5s
    then:
      - lambda: 'id(exibir_ph) = !id(exibir_ph);'

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      if (id(exibir_ph)) {
        // Tela do pH
        it.print(64, 0, id(font_header), TextAlign::TOP_CENTER, "pH PISCINA");
        it.printf(64, 40, id(font_valor), TextAlign::CENTER, "%.2f", id(ph_piscina).state);
      } else {
        // Tela do ORP
        it.print(64, 0, id(font_header), TextAlign::TOP_CENTER, "ORP PISCINA");
        it.printf(64, 40, id(font_valor), TextAlign::CENTER, "%.0f", id(orp_piscina).state);
        
        // O "mV" pequenininho ancorado no canto inferior direito
        it.print(127, 63, id(font_mini), TextAlign::BASELINE_RIGHT, "mV");
      }

      // Heartbeat (Pisca no canto superior direito do amarelo)
      if (id(heartbeat_active)) {
        it.filled_circle(120, 7, 4); 
      }
