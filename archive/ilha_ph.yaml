esphome:
  name: piscina-ilha-ph

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

wifi:
  ssid: "ELIGHT"
  password: "universo"

web_server:
  port: 80

api:

logger:
  hardware_uart: USB_SERIAL_JTAG

ota:
  - platform: esphome

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

ads1115:
  - id: ads_sensor
    address: 0x48

one_wire:
  - platform: gpio
    pin: GPIO10

globals:
  - id: ref1_ph
    type: float
    restore_value: yes
    initial_value: '7.0'
  - id: volt1_ph
    type: float
    restore_value: yes
    initial_value: '2.5'
  - id: ref2_ph
    type: float
    restore_value: yes
    initial_value: '4.0'
  - id: volt2_ph
    type: float
    restore_value: yes
    initial_value: '3.0'

number:
  - platform: template
    name: "Calibração: pH Alvo 1"
    id: input_ref1
    min_value: 0
    max_value: 14
    step: 0.1
    optimistic: true
    set_action:
      - globals.set:
          id: ref1_ph
          value: !lambda "return x;"

  - platform: template
    name: "Calibração: Voltagem Lida 1"
    id: input_volt1
    min_value: 0
    max_value: 5
    step: 0.01
    optimistic: true
    set_action:
      - globals.set:
          id: volt1_ph
          value: !lambda "return x;"

  - platform: template
    name: "Calibração: pH Alvo 2"
    id: input_ref2
    min_value: 0
    max_value: 14
    step: 0.1
    optimistic: true
    set_action:
      - globals.set:
          id: ref2_ph
          value: !lambda "return x;"

  - platform: template
    name: "Calibração: Voltagem Lida 2"
    id: input_volt2
    min_value: 0
    max_value: 5
    step: 0.01
    optimistic: true
    set_action:
      - globals.set:
          id: volt2_ph
          value: !lambda "return x;"

sensor:
  # Temperatura — leitura a cada 10s
  - platform: dallas_temp
    name: "Temperatura da Água"
    id: temp_agua
    update_interval: 10s

  # Voltagem bruta do ADS1115 com pipeline de filtro corrigido:
  # - median janela 11, send_every 11: envia uma amostra a cada 5.5s (0.5s * 11)
  # - moving average janela 5 suaviza sem engolir o sinal
  - platform: ads1115
    ads1115_id: ads_sensor
    multiplexer: A0_GND
    gain: 6.144
    name: "Voltagem Bruta pH (Referência)"
    id: voltagem_bruta
    update_interval: 0.5s
    accuracy_decimals: 4
    unit_of_measurement: "V"
    filters:
      - median:
          window_size: 11
          send_every: 11
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  # pH calibrado com compensação de temperatura
  # Fórmula de Nernst simplificada: corrige ~0.003 pH por °C em relação a 25°C
  # O sinal é invertido porque o pH4502C inverte a saída (mais pH = menos tensão)
  - platform: template
    name: "pH da Piscina (Calibrado)"
    id: ph_final
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    update_interval: 6s
    lambda: |-
      float v_atual = id(voltagem_bruta).state;
      if (isnan(v_atual)) return NAN;

      // Leitura de temperatura com fallback para 25°C
      float temp = id(temp_agua).state;
      if (isnan(temp)) temp = 25.0f;

      // Pontos de calibração
      float v1 = id(volt1_ph); float ph1 = id(ref1_ph);
      float v2 = id(volt2_ph); float ph2 = id(ref2_ph);

      // Evita divisão por zero
      if (fabsf(v1 - v2) < 0.001f) return ph1;

      // Interpolação linear entre os dois pontos de calibração
      float inclinacao = (ph2 - ph1) / (v2 - v1);
      float offset     = ph1 - (inclinacao * v1);
      float ph_raw     = (inclinacao * v_atual) + offset;

      // Compensação de temperatura pela equação de Nernst simplificada
      // Fator de correção: 0.003 pH/°C (eletrodo de vidro típico)
      float ph_compensado = ph_raw + 0.003f * (temp - 25.0f);

      // Limita saída ao range físico possível
      if (ph_compensado < 0.0f)  ph_compensado = 0.0f;
      if (ph_compensado > 14.0f) ph_compensado = 14.0f;

      return ph_compensado;