esphome:
  name: "water-sensor"
  friendly_name: "Water Sensor"
  includes: [tuya_w218.h]
  on_boot:
    priority: -10
    then:
      - lambda: |-
          static W218Driver* driver = new W218Driver(id(uart_bus));
          driver->ph_sensor = id(ph_piscina);
          driver->orp_sensor = id(orp_piscina);
          driver->temp_sensor = id(temp_agua);
          driver->tds_sensor = id(tds_cond);
          driver->ec_sensor = id(ec_piscina);
          driver->salinity_sensor = id(sal_piscina);
          driver->cf_sensor = id(cf_piscina);
          driver->time_source = id(sntp_time);
          id(w218_ptr) = (void*) driver;
  on_loop:
    then:
      - lambda: |-
          if(id(w218_ptr) != nullptr) {
            ((W218Driver*)id(w218_ptr))->tick();
          }

bk72xx:
  board: wb3s

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Water-Sensor Fallback Hotspot"
    password: !secret wifi_fallback_password

captive_portal:

logger:
  level: INFO
  hardware_uart: UART1

uart:
  id: uart_bus
  rx_pin: P10
  tx_pin: P11
  baud_rate: 9600

globals:
  - id: w218_ptr
    type: void*
    initial_value: "nullptr"

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"

sensor:
  - platform: wifi_signal
    name: "Sinal Wi-Fi"

  - platform: template
    name: "pH"
    id: ph
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    state_class: measurement

  - platform: template
    name: "ORP"
    id: orp
    unit_of_measurement: "mV"
    accuracy_decimals: 0
    state_class: measurement

  - platform: template
    name: "Water Temperature"
    id: temp_agua
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement

  - platform: template
    name: "TDS and Conductivity"
    id: tds_cond
    unit_of_measurement: "µS/cm"
    accuracy_decimals: 0
    state_class: measurement

  - platform: template
    name: "Electrical conductivity"
    id: ec
    unit_of_measurement: "mS/cm"
    accuracy_decimals: 2
    state_class: measurement

  - platform: template
    name: "Salinity"
    id: sal
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    state_class: measurement

  - platform: template
    name: "CF factor"
    id: cf
    accuracy_decimals: 1
    state_class: measurement
